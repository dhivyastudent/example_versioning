name: Sanity test

on:
  push:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  test_model:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: install dependencies
        run: |
          pip install -r requirements.txt

      - name: run tests
        run: |
          python -m unittest 2>&1 | tee test_output.txt

      - name: create report
        run: |
          echo "## Test Output" > report.md
          cat test_output.txt >> report.md
