name: ML Pipeline

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ml_pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 4. Debug (VERY IMPORTANT)
      - name: Debug files
        run: |
          echo "Listing files:"
          ls -R

      # 5. Run training
      - name: Run training
        run: |
          python train.py

      # 6. Run testing
      - name: Run testing
        run: |
          python test.py

      # 7. Show outputs (for logs)
      - name: Show outputs
        run: |
          echo "Prediction output:"
          cat prediction.txt

      # 8. Commit & push results
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add model.pkl prediction.txt

          git commit -m "Add model and prediction" || echo "No changes to commit"

          git push
