name: ML Pipeline

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ml_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install tensorflow numpy tqdm pillow

      # ✅ RUN TRAINING (generates metrics.csv)
      - name: Run training
        run: |
          python train.py

      # ✅ SHOW REAL METRICS (IMPORTANT)
      - name: Show training metrics
        run: |
          echo "===== TRAINING METRICS ====="
          cat metrics.csv

      # ✅ RUN TEST (prediction)
      - name: Run testing
        run: |
          python -m unittest test.py

      # ✅ SHOW PREDICTION OUTPUT
      - name: Show prediction
        run: |
          cat prediction.txt

      # ✅ CREATE REPORT FILE
      - name: Create report
        run: |
          echo "## Training Metrics" > report.md
          cat metrics.csv >> report.md
          echo "\n## Prediction Output" >> report.md
          cat prediction.txt >> report.md

      # ✅ COMMIT OUTPUTS BACK TO REPO
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add metrics.csv prediction.txt report.md top_model_complete.h5 || true
          git commit -m "Add training metrics and prediction output" || echo "No changes"
          git push
